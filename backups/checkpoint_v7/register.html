<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | Klinik Yönetim Sistemi</title>
    <!-- Outfit Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --accent: #0a3d34; /* Deep Emerald */
            --accent-hover: #072b25;
            --accent-light: #0a3d3410;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            
            --radius-md: 12px;
            --radius-lg: 20px;
            
            --shadow-lg: 0 20px 40px -8px rgba(0, 0, 0, 0.18);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, hsla(172, 85%, 30%, 0.08) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(170, 70%, 40%, 0.08) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: var(--radius-lg);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: var(--shadow-lg);
        }

        .login-header { text-align: center; margin-bottom: 32px; }
        .login-icon-wrap {
            width: 64px; height: 64px;
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px auto;
        }

        .login-title { font-size: 1.5rem; font-weight: 800; color: var(--text-primary); margin-bottom: 4px; }
        .login-subtitle { font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; margin-bottom: 8px;
            font-size: 0.75rem; font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .input-wrap { position: relative; }
        .input-wrap i {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            color: #94a3b8; width: 18px; height: 18px;
            pointer-events: none;
        }

        input {
            width: 100%; background: #ffffff;
            border: 1px solid var(--border-color);
            padding: 12px 14px 12px 42px;
            border-radius: var(--radius-md);
            height: 48px; font-family: inherit;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light);
            outline: none;
        }

        .btn-primary {
            width: 100%; background: var(--accent);
            color: white; padding: 14px; border: none;
            border-radius: var(--radius-md); font-weight: 700;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); }

        .error-message {
            display: none; background: var(--danger-light);
            color: var(--danger); padding: 12px;
            border-radius: var(--radius-md); font-size: 0.85rem;
            margin-bottom: 20px; align-items: center; gap: 8px;
        }
        .error-message.show { display: flex; }

        .success-message {
            display: none; background: #f0fdf4;
            color: #166534; padding: 20px;
            border-radius: var(--radius-md); font-size: 0.9rem;
            text-align: center; line-height: 1.6;
        }
        .success-message.show { display: block; }

        .footer-link {
            text-align: center; margin-top: 24px;
            font-size: 0.85rem; color: var(--text-secondary);
        }
        .footer-link a { color: var(--accent); text-decoration: none; font-weight: 700; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loading-spinner { animation: spin 0.8s linear infinite; display: none; }
        .btn-primary.loading .loading-spinner { display: block; }
        .btn-primary.loading .btn-text { display: none; }

    </style>
</head>
<body id="register-page">
    <div class="login-container">
        <div id="register-content">
            <div class="login-header">
                <div class="login-icon-wrap">
                    <i data-lucide="user-plus" style="width: 32px; height: 32px;"></i>
                </div>
                <h1 class="login-title">Yeni Kayıt</h1>
                <p class="login-subtitle">Klinik hesabınızı oluşturun</p>
            </div>

            <div id="errorMessage" class="error-message">
                <i data-lucide="alert-circle" style="width: 18px; height: 18px;"></i>
                <span id="errorText">Bir hata oluştu.</span>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="clinicName">Klinik Adı / Doktor Adı</label>
                    <div class="input-wrap">
                        <input type="text" id="clinicName" required placeholder="Örn: Dr. Yelda Yaren Şentürk">
                        <i data-lucide="clapperboard"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">E-posta Adresi</label>
                    <div class="input-wrap">
                        <input type="email" id="email" required placeholder="ornek@klinik.com">
                        <i data-lucide="mail"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Şifre</label>
                    <div class="input-wrap">
                        <input type="password" id="password" required placeholder="En az 6 karakter" minlength="6">
                        <i data-lucide="lock"></i>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="registerBtn">
                    <span class="btn-text">Hesabımı Oluştur</span>
                    <i data-lucide="loader-2" class="loading-spinner"></i>
                </button>
            </form>

            <div class="footer-link">
                Zaten hesabınız var mı? <a href="login.html">Giriş Yap</a>
            </div>
        </div>

        <div id="successMessage" class="success-message">
            <div style="width: 48px; height: 48px; background: #dcfce7; color: #15803d; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto;">
                <i data-lucide="check" style="width: 24px; height: 24px;"></i>
            </div>
            <h2 style="margin-bottom: 8px;">Kayıt Başarılı!</h2>
            <p>Hesabınız oluşturuldu ancak yönetici onayı bekleniyor. Onaylandığında e-posta alacaksınız veya tekrar giriş yapmayı deneyebilirsiniz.</p>
            <a href="login.html" class="btn-primary" style="margin-top: 20px; text-decoration: none;">Giriş Ekranına Dön</a>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
