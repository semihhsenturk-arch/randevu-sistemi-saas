<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisteme Giriş | Uzm. Dr. Yelda Yaren Şentürk</title>
    <!-- Outfit Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --accent: #0a3d34; /* Deep Emerald */
            --accent-hover: #072b25;
            --accent-light: #0a3d3410;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            
            --radius-md: 12px;
            --radius-lg: 20px;
            
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 40px -8px rgba(0, 0, 0, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(at 0% 0%, hsla(172, 85%, 30%, 0.08) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(170, 70%, 40%, 0.08) 0, transparent 50%);
            background-attachment: fixed;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: var(--radius-lg);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: var(--shadow-lg);
            animation: fade-in-up 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-icon-wrap {
            width: 64px;
            height: 64px;
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px auto;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .login-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            width: 18px;
            height: 18px;
            pointer-events: none;
            transition: color 0.2s;
        }

        input {
            width: 100%;
            background: #ffffff;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 14px 12px 42px;
            border-radius: var(--radius-md);
            height: 48px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light);
            outline: none;
        }

        input:focus + i {
            color: var(--accent);
        }

        .btn-primary {
            width: 100%;
            background: var(--accent);
            color: white;
            padding: 14px;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 4px 14px -3px rgba(10, 61, 52, 0.3);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -4px rgba(10, 61, 52, 0.35);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Loading spinner */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        .loading-spinner {
            animation: spin 0.8s linear infinite;
            display: none;
        }
        .btn-primary.loading .loading-spinner { display: block; }
        .btn-primary.loading .btn-text { display: none; }
        .btn-primary.loading { pointer-events: none; opacity: 0.9; }

        .error-message {
            display: none;
            background: var(--danger-light);
            color: var(--danger);
            padding: 12px 14px;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            align-items: center;
            gap: 8px;
            border: 1px solid #fecaca;
        }
        .error-message.show {
            display: flex;
            animation: fade-in-up 0.3s ease;
        }

        .clinic-label {
            position: absolute;
            bottom: 20px;
            text-align: center;
            width: 100%;
            left: 0;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        
    </style>
</head>
    <body id="login-page">
    <div class="login-container">
        <div class="login-header">
            <div class="login-icon-wrap">
                <i data-lucide="shield-check" style="width: 32px; height: 32px;"></i>
            </div>
            <h1 class="login-title">Klinik Yönetimi</h1>
            <p class="login-subtitle">Sisteme devam etmek için giriş yapın</p>
        </div>

        <div id="errorMessage" class="error-message">
            <i data-lucide="alert-circle" style="width: 18px; height: 18px;"></i>
            <span id="errorText">E-posta veya şifre hatalı.</span>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-posta Adresi</label>
                <div class="input-wrap">
                    <input type="email" id="email" required placeholder="ornek@klinik.com" autocomplete="email">
                    <i data-lucide="mail"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Şifre</label>
                <div class="input-wrap">
                    <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
                    <i data-lucide="lock"></i>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="loginBtn">
                <span class="btn-text">Giriş Yap</span>
                <i data-lucide="loader-2" class="loading-spinner"></i>
            </button>
        </form>
    </div>

    <div class="clinic-label">© 2026 Uzm. Dr. Yelda Yaren Şentürk Randevu Sistemi</div>

    <script src="auth.js" defer></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
